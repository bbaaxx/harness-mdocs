name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish, e.g. v0.4.1'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v5
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --loglevel=error

      - name: Verify tag matches package version
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_NAME="${DISPATCH_TAG}"
          fi

          if [ -z "${TAG_NAME}" ]; then
            echo "Missing tag name" >&2
            exit 1
          fi

          if [ "${TAG_NAME}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

          echo "RELEASE_TAG=${TAG_NAME}" >> "${GITHUB_ENV}"
          echo "PACKAGE_VERSION=${PACKAGE_VERSION#v}" >> "${GITHUB_ENV}"

      - name: Run release checks
        run: npm run release:check

      - name: Check npm publication status
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish"
            echo "NPM_ALREADY_PUBLISHED=true" >> "${GITHUB_ENV}"
          else
            echo "NPM_ALREADY_PUBLISHED=false" >> "${GITHUB_ENV}"
          fi

      - name: Publish to npm
        if: env.NPM_ALREADY_PUBLISHED != 'true'
        run: npm publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub Release ${RELEASE_TAG} already exists; skipping"
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --generate-notes
