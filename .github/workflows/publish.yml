name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish, e.g. v0.4.1'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v5
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --loglevel=error

      - name: Verify tag matches package version
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_NAME="${DISPATCH_TAG}"
          fi

          if [ -z "${TAG_NAME}" ]; then
            echo "Missing tag name" >&2
            exit 1
          fi

          if [ "${TAG_NAME}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Run release checks
        run: npm run release:check

      - name: Verify version is not already published
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published" >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
